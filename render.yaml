# Render Blueprint — deploy from repo root
# Dashboard: New → Blueprint → connect this repo

services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./06-lab-complete/Dockerfile
    dockerContext: ./06-lab-complete
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: agent-cache
          property: connectionString
      - key: REDIS_HOSTPORT
        fromService:
          type: keyvalue
          name: agent-cache
          property: hostport
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"

  - type: keyvalue
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # chỉ cho phép kết nối nội bộ Render (web → redis)
